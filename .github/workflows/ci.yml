name: CI (fast)

# Fast tier — runs on every push and PR. NO API keys, NO network LLM calls.
# Proves "did my code/prompts/metrics regress?" by replaying recorded inputs and running
# the keyless deterministic eval checks (abstention, citations, must_contain) over them.
# The paid, non-deterministic Claude-judge metrics deliberately do NOT run here — they
# live in the judged/live tiers so a flaky paid check never blocks a merge.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    env:
      LIVE_LLM: "0" # replay recorded inputs; a cache miss is a hard failure
      DETERMINISTIC_ONLY: "1" # keyless checks only (no Anthropic judge)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Offline unit tests
        run: uv run python -m pytest -q -k "not test_functional"

      - name: Functional eval — deterministic checks (replay, keyless)
        run: uv run python -m pytest evals/test_functional.py -q

      - name: Adversarial red-team — deterministic attacks (replay, keyless)
        run: uv run python -m pytest adversarial/test_redteam.py -q

      - name: Agent reliability — graph tests (scripted model, keyless)
        run: uv run python -m pytest agent_tests/ -q
