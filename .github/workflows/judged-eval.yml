name: Judged eval (replay Gemini + LIVE Claude judge)

# Middle tier — opt-in, NON-blocking. Replays the recorded Gemini answers (LIVE_LLM=0, no
# Google key, no generator drift) but calls the Claude judge FRESH and LIVE over them
# (JUDGE_LIVE=1: no verdict-cache read, no write). This is the genuine second opinion — it
# validates that the metric logic still holds against a real, non-deterministic judge, and
# deliberately does NOT overwrite the committed verdict baseline (recording is LIVE_LLM's job).
#
# It is NOT on the every-PR blocking path on purpose: the Claude judge is non-deterministic
# (a known finding — it once flaked on a correct answer) and costs money, so gating merges
# on it would cause spurious red builds. Trigger it manually, or by labeling a PR `judged-eval`.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  judged:
    # Only run on label events when the label is exactly `judged-eval` (manual dispatch always runs).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'judged-eval' }}
    runs-on: ubuntu-latest
    env:
      LIVE_LLM: "0" # replay recorded Gemini answers (no model drift, no Google key)
      JUDGE_LIVE: "1" # call the Claude judge FRESH — bypass the verdict cache (no read/write)
      DETERMINISTIC_ONLY: "0" # run the Claude-judged metrics too
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # needed only if a retrieval cache miss occurs
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Functional eval — replay Gemini answers, FRESH live Claude judge
        run: uv run python -m pytest evals/test_functional.py -v

      - name: Adversarial red-team — replay responses, FRESH live toxicity judge
        run: uv run python -m pytest adversarial/test_redteam.py -v

      - name: Meta-eval — judge floors vs human gold set (committed calibration scores)
        run: uv run python -m pytest meta_eval/test_meta_eval.py -v
