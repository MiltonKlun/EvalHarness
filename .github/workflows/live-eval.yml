name: Live drift eval

# Live tier — makes REAL Gemini + Claude calls to detect model drift, and runs the
# stochasticity/determinism probe. This is the ONLY tier that exercises the live,
# non-deterministic model; everything else replays recordings. Runs weekly on a schedule
# and on demand. Re-records the cache as a side effect (re-recordings are an artifact, not
# auto-committed — review drift before updating the baseline).
#
# NOTE: the Gemini free tier is ~20 generate-requests/day/model, so the full 21-case live
# run can hit the cap. The job is best-effort: it uploads whatever it produced and never
# fails the schedule on a quota 429 (continue-on-error on the eval step).

on:
  workflow_dispatch:
    inputs:
      samples:
        description: "Determinism-probe samples per case"
        default: "3"
  schedule:
    - cron: "0 6 * * 1" # 06:00 UTC every Monday

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      LIVE_LLM: "1" # REAL calls — this is the drift check
      DETERMINISTIC_ONLY: "0"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Record metrics-over-time row + enforce the regression gate
        # RUNS FIRST, on the pristine checkout, on purpose. NOT continue-on-error: this is
        # the drift alarm. record_history replays the COMMITTED recordings (LIVE_LLM=0),
        # appends one row, then fails (exit 1) if a suite mean dropped beyond thresholds.yaml's
        # max_mean_drop — OR if case coverage shrank — versus the last committed row.
        #
        # Why first: the LIVE steps below re-record fresh Gemini answers onto the runner's
        # cache; a mid-run quota 429 leaves that footprint partial, which previously truncated
        # this row to 18/21 cases and excluded the drifted cases from the very means the gate
        # checks. Running before any live step guarantees a full 21-case, like-for-like compare
        # against the committed baseline. Live-drift *detection* is the job of the steps below
        # (their reports) and the meta-eval floor step; this step is the committed-baseline gate.
        env:
          LIVE_LLM: "0"
        run: |
          uv run python -m evals.record_history | tee history-report.txt

      - name: Functional eval — LIVE (real Gemini + Claude; detects drift)
        id: liveeval
        continue-on-error: true # quota 429s shouldn't fail the scheduled job
        run: uv run python -m pytest evals/test_functional.py -v | tee live-eval-report.txt

      - name: Adversarial red-team — LIVE (real attacks against the live agent)
        continue-on-error: true
        run: uv run python -m adversarial.run | tee redteam-report.txt

      - name: Agent reliability — LIVE tool-choice check (real Gemini tool selection)
        continue-on-error: true
        run: uv run python -m pytest agent_tests/test_live_tool_choice.py -v

      - name: Meta-eval — LIVE judge-drift check (re-measure judge vs human gold set)
        continue-on-error: true
        run: uv run python -m meta_eval.run --live | tee meta-eval-report.txt

      - name: Enforce judge-drift floors (accuracy >= 80%, kappa >= 0.60)
        # NOT continue-on-error: the SECOND drift alarm. The step above re-recorded
        # meta_eval/scores.json against the FRESH live judge; this runs the floor assertions
        # over those fresh scores, so a judge that degraded below the floors turns the
        # scheduled run RED (fulfilling the README's "if a future Claude version degrades, the
        # suite goes red"). Known edge: if the --live step 429'd/errored, scores.json is the
        # committed baseline and this checks the stale (passing) scores — acceptable; the row
        # gate and live reports still surface the outage.
        run: uv run python -m pytest meta_eval/test_meta_eval.py -q

      - name: Stochasticity / determinism probe
        continue-on-error: true
        # --delay 13 keeps the probe under the free-tier ~5 requests/minute cap; without it
        # the back-to-back calls 429 immediately. (With billing, delay can drop to 0.)
        run: |
          uv run python -m evals.determinism_experiment \
            --samples "${{ github.event.inputs.samples || '3' }}" --delay 13 | tee determinism-report.txt


      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-eval-reports
          path: |
            live-eval-report.txt
            redteam-report.txt
            meta-eval-report.txt
            determinism-report.txt
            history-report.txt
            evals/history/runs.csv

      - name: Summary
        if: always()
        run: |
          {
            echo "## Live drift eval"
            echo '```'
            tail -n 20 live-eval-report.txt 2>/dev/null || echo "(no functional report)"
            echo '```'
            echo "## Adversarial red-team"
            echo '```'
            tail -n 25 redteam-report.txt 2>/dev/null || echo "(no red-team report)"
            echo '```'
            echo "## Determinism probe"
            echo '```'
            tail -n 30 determinism-report.txt 2>/dev/null || echo "(no determinism report)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Guard — the run must have produced results
        # Every eval step is continue-on-error so a partial quota run still uploads what it
        # got. But a run where EVERYTHING silently failed must not report green: if the
        # functional live report is missing or empty, no real work happened — fail loudly
        # instead of a green build with an empty artifact.
        run: |
          if [ ! -s live-eval-report.txt ]; then
            echo "::error::live-eval-report.txt is missing or empty — the live run produced no results (check secrets/quota)."
            exit 1
          fi
          echo "Live run produced results ($(wc -l < live-eval-report.txt) lines)."
