# Metric pass/fail thresholds — CALIBRATED by the Phase 6 meta-eval.
# faithfulness was set by `make meta-eval` (run meta-eval-2026-06-29): the cutoff that best
# separates the hand-labeled gold set, minus a 0.05 margin for the judge's noise.
# The judge has a documented lenient bias (JUDGE-001 in adversarial/FINDINGS.md) —
# ~80% accuracy, so these scores are an UPPER BOUND on true groundedness.
# Re-running the meta-eval (judge-drift check) re-derives these values.
calibrated: true
calibration_run: meta-eval-2026-06-29
per_answer:
  faithfulness: 0.5
  answer_relevancy: 0.7
regression:
  max_mean_drop: 0.1
